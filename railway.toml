[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

startCommand = "bash start.sh"
cronSchedule = "0 * * * *"

[variables]
# Railpack: install postgresql-client (psql) in the runtime image
RAILPACK_DEPLOY_APT_PACKAGES = "postgresql-client"
DATABASE_URL = ""
TRANSFORM_SQL = ""
DEBUG = "false"

